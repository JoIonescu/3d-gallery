<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View in your space — Hanna</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; }

    model-viewer {
      width: 100%;
      flex: 1;
      background-color: #0a0a0a;
      --poster-color: #0a0a0a;
    }

    #header {
      padding: 16px 20px;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 0.5px solid rgba(255,255,255,0.1);
    }
    #title {
      font-size: 13px;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.7);
    }
    #back {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #FBD00E;
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
    }
    #hint {
      text-align: center;
      padding: 12px;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.3);
      background: rgba(0,0,0,0.6);
    }
  </style>
</head>
<body>
  <div id="header">
    <span id="title">Loading...</span>
    <button id="back" onclick="window.close()">✕ Close</button>
  </div>

  <model-viewer
    id="viewer"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    ar-button-label="Place in your room"
  ></model-viewer>

  <div id="hint">Tap the AR button to place this work in your space</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const model  = params.get('model');
    const title  = params.get('title') || 'Artwork';

    document.getElementById('title').textContent = title;

    const viewer = document.getElementById('viewer');
    viewer.setAttribute('src', model);
    viewer.setAttribute('alt', title);
  </script>
</body>
</html>
